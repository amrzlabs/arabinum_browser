    async function getAuthenticatedUser() {
        const { data: { user } } = await supabase.auth.getUser();

                provider: 'google',

            return null;
        }
        return user; // نعيد بيانات المستخدم إذا كان مسجلاً
    }

    var submitButton = document.getElementById('submitButton');
